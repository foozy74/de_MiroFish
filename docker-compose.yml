services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - UV_SYSTEM_PYTHON=1
      - MIROFISH_ENV=production
      - FLASK_DEBUG=false
    ports:
      - "5001:5001"
    volumes:
      - mirofish-uploads:/app/uploads
      - mirofish-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - mirofish-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - mirofish-net

volumes:
  mirofish-uploads:
  mirofish-logs:

networks:
  mirofish-net:
    driver: bridge
